; ESP32-A1S media player
;
; Two build environments — flash the one that matches your board's codec.
; ES8388 vs AC101 is the main source of A1S confusion: the PCB silkscreen
; often does not distinguish them. Check the IC marking near the 3.5mm jacks.
;
;   pio run -e esp32-a1s-es8388 -t upload
;   pio run -e esp32-a1s-ac101  -t upload

[platformio]
default_envs = esp32-a1s-es8388

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv
; main_sim.cpp is only for the esp32-sim env; exclude it from hardware builds
; so the two setup()/loop() pairs don't collide at link time.
build_src_filter = +<*> -<main_sim.cpp>

lib_deps =
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/arduino-audio-driver.git
    https://github.com/pschatzmann/arduino-libhelix.git
    olikraus/U8g2@^2.35.30

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Enable PSRAM. A1S V2.3 with ES8388 ships with 4 or 8 MB of SPI
    ; PSRAM on the module. timecode::lookupPosition needs ~4 MB for the
    ; dense LFSR-state→cycle-index LUT; without PSRAM the position
    ; feature degrades to always returning -1 (speed tracking still
    ; works). The cache-issue fix is harmless on chips that don't need
    ; it and required on ESP32 rev1/rev2 silicon.
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

[env:esp32-a1s-es8388]
; AudioKit V2.2 with ES8388 codec
build_flags =
    ${env.build_flags}
    -DMEDIAPLAYER_CODEC_ES8388=1

[env:esp32-a1s-ac101]
; AI Thinker ESP32 Audio Kit with AC101 codec
build_flags =
    ${env.build_flags}
    -DMEDIAPLAYER_CODEC_AC101=1

[env:esp32-sim]
; Wokwi headless-simulator build. No codec, no SD, no DSP — stubs the media
; list and swaps main.cpp for main_sim.cpp so the browser/controls/OLED can
; be exercised in CI. See sim/README.md. lib_deps is replaced (not extended)
; to drop the audiokit/audio-tools/libhelix stack that the sim can't satisfy.
lib_deps =
    olikraus/U8g2@^2.35.30
build_src_filter =
    -<*>
    +<main_sim.cpp>
    +<controls.cpp>
    +<ui.cpp>
build_flags =
    ${env.build_flags}
    -DMEDIAPLAYER_SIM=1
